<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🩺 Book Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            font-family: 'Segoe UI', sans-serif;
        }
        .form-container {
            max-width: 600px;
            margin: 60px auto;
            background-color: #ffffff;
            padding: 40px 35px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            animation: fadeIn 0.7s ease-in-out;
        }
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .form-header img {
            width: 75px;
            margin-bottom: 12px;
        }
        .form-header h3 {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .form-header .badge {
            font-size: 1rem;
            padding: 8px 14px;
        }
        .form-label {
            font-weight: 600;
            color: #34495e;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px;
        }
        .btn-success {
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            background-color: #28a745;
            transform: translateY(-2px);
            box-shadow: 0 5px 14px rgba(0,0,0,0.2);
        }
        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            font-weight: 500;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(25px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <!-- Header -->
        <div class="form-header">
            <img src="https://cdn-icons-png.flaticon.com/512/387/387561.png" alt="Doctor Icon">
            <h3>📋 Book a Doctor</h3>
            <span class="badge bg-success">For: {{ disease }}</span>
        </div>

        <!-- Success Message -->
        {% if success %}
        <div class="alert alert-success text-center">
            ✅ {{ success }}
        </div>
        {% endif %}

        <!-- Booking Form -->
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">👤 Your Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">📧 Your Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">👨‍⚕️ Choose Doctor</label>
                <select name="doctor" class="form-select" required>
                    <option disabled selected value="">Select a doctor</option>
                    {% for index, row in doctors.iterrows() %}
                        <option value="{{ row['Name'] }}">
                            {{ row['Name'] }} ({{ row['Specialization'] }}) - {{ row['Email'] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">✅ Confirm Appointment</button>
        </form>

        <!-- Back Link -->
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
