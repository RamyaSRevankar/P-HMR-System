<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>👨‍⚕️ Doctor Login | P-HMR System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSv2qrAjRut5mYPKUQAQ0U-AthPWb7bO3UMVQ&s");
      background-size: cover;
      background-position: center;
      color: white;
    }

    .login-container {
      max-width: 400px;
      width: 100%;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .form-control {
      border-radius: 10px;
      padding-right: 40px;
    }

    .btn-custom {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      background-color: #00cec9;
      color: white;
      transition: background 0.3s ease, transform 0.2s ease;
      margin-top: 10px;
    }
    .btn-custom:hover {
      background-color: #009b9f;
      transform: translateY(-2px);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #333;
      font-size: 1.25rem;
      transition: color 0.3s ease;
    }
    .password-toggle:hover {
      color: #00cec9;
    }

    .error-message {
      color: #ffcccc;
      margin-top: 15px;
    }

    .register-link {
      margin-top: 15px;
      color: #ddd;
    }
    .register-link a {
      color: #74b9ff;
      text-decoration: none;
      font-weight: bold;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2 class="mb-4">👨‍⚕️ Doctor Login</h2>
    <form method="POST">
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="👤 Username" required>
      </div>
      <div class="mb-3 password-wrapper">
        <input type="password" id="password" name="password" class="form-control" placeholder="🔒 Password" required>
        <i class="bi bi-eye-fill password-toggle" id="togglePassword"></i>
      </div>
      <button type="submit" class="btn btn-custom">Login</button>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <p class="error-message">⚠️ {{ messages[0] }}</p>
        {% endif %}
      {% endwith %}
    </form>
    <div class="register-link">
      Not registered? <a href="{{ url_for('doctor_register') }}">Register here</a>
    </div>
  </div>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        this.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
      } else {
        pwd.type = 'password';
        this.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
