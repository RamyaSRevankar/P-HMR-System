<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌿 P-HMR System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
     margin: 0;
      padding: 0;
       background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTstoDxWKw4BtN9lSBqisMEzOLiO0SFRcR5Zw&s");
       background-size: cover;
       background-position: center;
       color: white;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
         justify-content: center;
          align-items: center;
           height: 100vh;
           text-align: center;
           }
           .container {
           max-width: 800px;
           padding: 40px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
             }
              h1 {
               font-size: 3rem;
                margin-bottom: 15px;
                 }
                  p {
                   font-size: 1.2rem;
                    margin-bottom: 30px;
                     }
                      .login-buttons {
                      display: flex;
                       justify-content: center;
                       gap: 25px;
                       flex-wrap: wrap;
                       }
                       .btn-custom {
                       padding: 15px 30px;
                       font-size: 1.1rem;
                       border: none;
                       border-radius: 12px;
                       color: white;
                       text-decoration: none;
                       transition: all 0.3s ease;
                       display: flex;
                       align-items: center;
                       gap: 8px;
                       }
                       .btn-user {
                       background-color: #00b894;
                       }
                        .btn-user:hover {
                         background-color: #019875;
                         }
                          .btn-admin {
                           background-color: #d63031;
                           }
                           .btn-admin:hover {
                            background-color: #b92d2d;
                            }
                             .btn-doctor {
                             background-color: #0984e3;
                             }
                             .btn-doctor:hover {
                             background-color: #0666b2;
                             }
                             @media (max-width: 576px) {
                             h1 {
                             font-size: 2rem;
                             }
                             .login-buttons {
                             flex-direction: column;
                             gap: 15px;
                             }
                             }
  </style>
</head>
<body>
<div class="container">
  <h1>🌿 P-HMR System</h1>
  <p>Welcome to the <strong>Personalized Healthcare & Medicine Recommendation</strong> system!</p>
  <div class="login-buttons">
    <a href="/user_login" class="btn-custom btn-user">👤 User Login</a>
    <a href="/admin_login" class="btn-custom btn-admin">🛠️ Admin Login</a>
    <a href="/doctor_login" class="btn-custom btn-doctor">👨‍⚕️ Doctor Login</a>
  </div>
</div>
</body>
</html>
