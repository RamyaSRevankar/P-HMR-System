<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛠️ Admin Dashboard | P-HMR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .dashboard-container {
            padding: 60px 30px;
        }

        .card {
            border-radius: 15px;
        }

        .btn {
            margin: 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .header-text {
            margin-bottom: 40px;
        }

        .logout-link {
            margin-top: 20px;
            display: inline-block;
            color: #ffdddd;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-link:hover {
            text-decoration: underline;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container dashboard-container text-center">
    <h1 class="header-text">👋 Welcome, Admin!</h1>

    <div class="row justify-content-center">
        <div class="col-md-4 mb-4">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5 class="card-title">👥 Total Users</h5>
                    <p class="card-text fs-2">{{ total_users }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5 class="card-title">📊 Total Predictions</h5>
                    <p class="card-text fs-2">{{ total_predictions }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card bg-danger text-white shadow">
                <div class="card-body">
                    <h5 class="card-title">⚠️ High-Risk Cases</h5>
                    <p class="card-text fs-2">{{ high_risk_count }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="mt-4">
        <a href="/admin_predictions" class="btn btn-outline-light">📄 View All Predictions</a>
        <a href="/admin_charts" class="btn btn-warning text-dark">📈 View Charts</a>
        <a href="/admin_panel" class="btn btn-info text-dark">👤 Manage Users</a>
        <a href="/admin_chatlogs" class="btn btn-success text-dark">🤖 Chatbot Logs</a>
        <a href="/admin_appointments" class="btn btn-secondary text-white">📅 Appointments</a>
    </div>

    <a href="/logout" class="logout-link">🚪 Logout</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
