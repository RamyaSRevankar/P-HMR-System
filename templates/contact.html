<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📞 Contact Us | HealthCare+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        .contact-form {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .form-label {
            font-weight: 500;
        }
        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">🌿 P-HMR </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/">🏠 Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">📝 Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/user_login">🔐 Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 📞 Contact Form -->
<div class="contact-form">
    <h2 class="text-center mb-4">📞 Contact Us</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">👤 Name</label>
            <input type="text" class="form-control" name="name" placeholder="Your full name" required>
        </div>
        <div class="mb-3">
            <label class="form-label">📧 Email</label>
            <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">💬 Message</label>
            <textarea class="form-control" name="message" rows="4" placeholder="Write your message here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-custom">📨 Send Message</button>
    </form>

    <!-- Optional Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-success mt-3">
                ✅ {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
