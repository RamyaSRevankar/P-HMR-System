<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>👨‍💼 Admin Login | P-HMR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background:
              linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQO_w6uOtGhu_468y6vz034gxQ3QW4bDfypvg&s");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255,255,255,0.15);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            text-align: center;
        }

        .form-control {
            border-radius: 10px;
            padding-right: 40px;
        }

        .btn-custom {
            width: 100%;
            border-radius: 10px;
            background-color: #e67e22;
            color: white;
            font-weight: bold;
            padding: 12px;
            margin-top: 10px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #d35400;
            transform: translateY(-2px);
        }

        .error-message {
            color: #ffcccc;
            margin-top: 15px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #333;
            font-size: 1.25rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #e67e22;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2 class="mb-4">🔐 Admin Login</h2>
    <form method="POST">
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="👤 Admin Username" required>
        </div>
        <div class="mb-3 password-wrapper">
            <input type="password" id="password" name="password" class="form-control" placeholder="🔒 Password" required>
            <i class="bi bi-eye-fill password-toggle" id="togglePassword"></i>
        </div>
        <button type="submit" class="btn btn-custom">Login</button>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
    </form>
</div>

<script>
    document.getElementById("togglePassword").addEventListener("click", function () {
        const pwd = document.getElementById("password");
        if (pwd.type === "password") {
            pwd.type = "text";
            this.classList.replace("bi-eye-fill", "bi-eye-slash-fill");
        } else {
            pwd.type = "password";
            this.classList.replace("bi-eye-slash-fill", "bi-eye-fill");
        }
    });
</script>

</body>
</html>
