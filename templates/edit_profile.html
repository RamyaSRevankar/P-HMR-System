<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>✏️ Edit Profile | P-HMR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
            padding-top: 60px;
        }

        .card {
            background-color: white;
            color: #333;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .edit-icon {
            font-size: 60px;
            color: #2575fc;
        }

        .btn-custom {
            background-color: #2575fc;
            color: white;
        }

        .btn-custom:hover {
            background-color: #155bc0;
        }

        label {
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="col-md-6">
        <div class="text-center mb-4">
            <div class="edit-icon">✏️</div>
            <h2>Edit Profile</h2>
            <p class="text-light">Update your personal details below.</p>
        </div>

        <div class="card p-4">
            <form method="POST" action="/edit_profile">
                <div class="mb-3">
                    <label>👤 Username:</label>
                    <input type="text" name="username" value="{{ user.username }}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>📧 Email:</label>
                    <input type="email" name="email" value="{{ user.email }}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>🔑 New Password (optional):</label>
                    <input type="password" name="password" class="form-control" placeholder="Leave blank to keep unchanged">
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-custom btn-lg">💾 Update</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
