<!DOCTYPE html>
<html>
<head>
    <title>👨‍⚕️ Doctor Register | HealthCare Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f0f8ff;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #007bff;
        }
        label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>👨‍⚕️ Doctor Registration Form</h2>
        <form method="POST">
            <div class="mb-3">
                <label>👤 Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label>🔐 Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create password" required>
            </div>
            <div class="mb-3">
                <label>👨‍⚕️ Full Name</label>
                <input type="text" name="doctor_name" class="form-control" placeholder="e.g., Dr. John Doe" required>
            </div>
            <div class="mb-3">
                <label>🏫 Specialization</label>
                <input type="text" name="specialization" class="form-control" placeholder="e.g., Cardiologist" required>
            </div>
            <button type="submit" class="btn btn-success w-100">✨ Register</button>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-warning mt-3">📢 {{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
        </form>
        <hr>
        <p class="text-center">
            Already Registered? <a href="{{ url_for('doctor_login') }}">🔐 Login here</a>
        </p>
    </div>
</body>
</html>
