<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>👤 My Profile | P-HMR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding-top: 60px;
        }

        .card {
            background-color: white;
            color: #333;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .profile-icon {
            font-size: 60px;
            color: #4a00e0;
        }

        .btn-custom {
            background-color: #4a00e0;
            color: white;
        }

        .btn-custom:hover {
            background-color: #3700b3;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="col-md-6">
        <div class="text-center mb-4">
            <div class="profile-icon">👤</div>
            <h2>My Profile</h2>
            <p class="text-light">Manage your personal information below.</p>
        </div>
        <div class="card p-4">
            <div class="card-body">
                <p><strong>🧑 Username:</strong> {{ session['user'] }}</p>
                <p><strong>📧 Email:</strong> {{ session['email'] }}</p>
                <div class="text-center mt-4">
                    <a href="/edit_profile" class="btn btn-custom btn-lg"><i class="fas fa-edit"></i> Edit Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS & Optional FontAwesome -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- FontAwesome CDN for optional icons -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
