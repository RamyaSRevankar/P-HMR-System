<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>👤 Register | P-HMR System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 25px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background-color: #00b894;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #019875;
        }

        p {
            margin-top: 15px;
        }

        a {
            color: #ffeaa7;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .message {
            color: #ff7675;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 User Registration</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="👤 Username" required><br>
        <input type="email" name="email" placeholder="📧 Email" required><br>
        <input type="password" name="password" placeholder="🔒 Password" required><br>
        <button type="submit">✅ Register</button>
    </form>

    <div class="message">{{ get_flashed_messages()[0] if get_flashed_messages() else '' }}</div>

    <p>🔁 Already have an account? <a href="/user_login">Login here</a></p>
</div>

</body>
</html>
