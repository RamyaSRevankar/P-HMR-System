<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📈 Prediction Charts - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        canvas {
            margin-top: 40px;
        }
        .btn-back {
            display: block;
            margin: 30px auto 0;
            background-color: #2c3e50;
            color: white;
        }
        .btn-back:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Prediction Statistics Dashboard</h2>

    <!-- Bar Chart: Predicted Diseases -->
    <canvas id="diseaseChart" height="100"></canvas>

    <!-- Pie Chart: Stage Distribution -->
    <canvas id="stageChart" height="200" width="200" class="mx-auto d-block"></canvas>

    <!-- Line Chart: Prediction Trends -->
    <canvas id="timeChart" height="100"></canvas>

    <a href="/dashboard_admin" class="btn btn-back mt-4">🔙 Back to Dashboard</a>
</div>

<script>
    const diseaseLabels = {{ disease_data | map(attribute=0) | list | tojson }};
    const diseaseCounts = {{ disease_data | map(attribute=1) | list | tojson }};

    const stageLabels = {{ stage_data | map(attribute=0) | list | tojson }};
    const stageCounts = {{ stage_data | map(attribute=1) | list | tojson }};

    const dateLabels = {{ date_data | map(attribute=0) | list | tojson }};
    const dateCounts = {{ date_data | map(attribute=1) | list | tojson }};

    // Disease Bar Chart
    new Chart(document.getElementById('diseaseChart'), {
        type: 'bar',
        data: {
            labels: diseaseLabels,
            datasets: [{
                label: '🦠 Predicted Diseases',
                data: diseaseCounts,
                backgroundColor: 'rgba(75, 192, 192, 0.7)',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: '#34495e' }
                },
                x: {
                    ticks: { color: '#34495e' }
                }
            }
        }
    });

    // Stage Pie Chart
    new Chart(document.getElementById('stageChart'), {
        type: 'pie',
        data: {
            labels: stageLabels,
            datasets: [{
                label: '📈 Stage Distribution',
                data: stageCounts,
                backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71']
            }]
        },
        options: {
            responsive: true
        }
    });

    // Time Line Chart
    new Chart(document.getElementById('timeChart'), {
        type: 'line',
        data: {
            labels: dateLabels.reverse(),
            datasets: [{
                label: '📅 Predictions Over Time',
                data: dateCounts.reverse(),
                borderColor: '#8e44ad',
                backgroundColor: 'rgba(142, 68, 173, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
</body>
</html>
